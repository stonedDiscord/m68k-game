name: Build
on:
  [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up compiler
      uses: actions/checkout@v6
      with:
        repository: 'tomstorey/m68k_bare_metal'
    - name: Setup compiler
      run: |
        cd m68k_bare_metal
        chmod +x *.sh
        ./linux-build-toolchain.sh
        cd libmetal
        make
    - name: Build
      run: make all
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        path: bmbinary