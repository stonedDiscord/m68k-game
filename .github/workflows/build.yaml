name: Build
on:
  [push, pull_request, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        path: 'm68k-game'
    - name: Download compiler
      uses: actions/checkout@v6
      with:
        repository: 'stonedDiscord/m68k_bare_metal'
        path: 'm68k_bare_metal'
    - uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: libmpc-dev libmpfr-dev 7zip
        version: 1.0
    - name: Cache toolchain
      uses: actions/cache@v5
      with:
        path: m68k_bare_metal/toolchain
        key: m68k-toolchain-${{ hashFiles('m68k_bare_metal/linux-build-toolchain.sh') }}
        restore-keys: |
          m68k-toolchain-
    - name: Setup compiler
      working-directory: m68k_bare_metal
      run: |
        chmod +x *.sh
        if [ ! -d "toolchain" ]; then
          ./linux-build-toolchain.sh
        fi
        echo "${{ github.workspace }}/m68k_bare_metal/toolchain/m68k-eabi-elf-14.3.0/bin/" >> "$GITHUB_PATH"
    - name: Cache libmetal
      uses: actions/cache@v5
      with:
        path: m68k_bare_metal/libmetal
        key: libmetal-${{ hashFiles('m68k_bare_metal/libmetal/**') }}
        restore-keys: |
          libmetal-
    - name: Build libmetal
      working-directory: m68k_bare_metal/libmetal
      run: |
        make
    - name: Build
      working-directory: m68k-game
      run: |
        make crt
        make all
    - name: Upload artifact
      uses: actions/upload-artifact@v6
      with:
        path: m68k-game/bmbinary