name: Build
on:
  [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        path: 'm68k-game'
    - name: Download compiler
      uses: actions/checkout@v6
      with:
        repository: 'tomstorey/m68k_bare_metal'
        path: 'm68k_bare_metal'
    - name: Setup compiler
      working-directory: m68k_bare_metal
      run: |
        chmod +x *.sh
        ./linux-build-toolchain.sh
        cd libmetal
        make
    - name: Build
      working-directory: m68k-game
      run: make all
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        path: m68k-game/bmbinary